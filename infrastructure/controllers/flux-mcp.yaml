apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: flux-operator-mcp
  namespace: flux-system
spec:
  type: oci
  interval: 1h
  url: oci://ghcr.io/controlplaneio-fluxcd/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator-mcp
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: flux-operator-mcp
      sourceRef:
        kind: HelmRepository
        name: flux-operator-mcp
      interval: 5m
  values:
    transport: http        # streamable HTTP; use 'sse' if your client prefers SSE
    readonly: true         # flip to false only if you want write operations
    networkPolicy:
      create: false        # we manage our own policy for external access
