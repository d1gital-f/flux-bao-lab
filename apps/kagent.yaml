---
apiVersion: v1
kind: Namespace
metadata:
  name: kagent

---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: kagent
  namespace: kagent
spec:
  interval: 1h
  type: oci
  url: oci://ghcr.io/kagent-dev/kagent/helm

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent-crds
  namespace: kagent
spec:
  interval: 30m
  chart:
    spec:
      chart: kagent-crds
      version: 0.9.5
      sourceRef:
        kind: HelmRepository
        name: kagent
        namespace: kagent
      interval: 1h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent
  namespace: kagent
spec:
  interval: 30m
  timeout: 10m
  dependsOn:
    - name: kagent-crds
  chart:
    spec:
      chart: kagent
      version: 0.9.5
      sourceRef:
        kind: HelmRepository
        name: kagent
        namespace: kagent
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # No API key in Git for step 1.
    # This lets us install and validate the platform first.
    providers:
      default: ollama

    controller:
      service:
        type: LoadBalancer

    ui:
      service:
        type: LoadBalancer

    # Keep the core kagent platform and in-cluster tool server.
    kmcp:
      enabled: true

    kagent-tools:
      enabled: true

    # Keep this lab-sized: do not auto-create packaged agents yet.
    # We will add our own 2-agent system explicitly in a later step.
    k8s-agent:
      enabled: false
    kgateway-agent:
      enabled: false
    istio-agent:
      enabled: false
    promql-agent:
      enabled: false
    observability-agent:
      enabled: false
    argo-rollouts-agent:
      enabled: false
    helm-agent:
      enabled: false
    cilium-policy-agent:
      enabled: false
    cilium-manager-agent:
      enabled: false
    cilium-debug-agent:
      enabled: false

    # Avoid optional external integrations for the first pass.
    grafana-mcp:
      enabled: false
    querydoc:
      enabled: false
